name: codegen

on:
  workflow_dispatch:
  push:
    paths:
      - "sql/**"
      - "backend/**"
      - ".github/workflows/codegen.yml"

jobs:
  gen:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: codegen_db
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -proot"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=20

    env:
      ORG: FutureTechQuant
      RUNNER_REPO: future-codegen-runner
      RUOYI_REPO: YunaiV/ruoyi-vue-pro
      RUOYI_REF: master-jdk17

    steps:
      - name: Checkout this repo (SQL + backend runner)
        uses: actions/checkout@v4

      - name: Generate GitHub App installation token (FutureCloneApp)
        id: app-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ vars.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          owner: ${{ env.ORG }}

      - name: Ensure runner repo exists (create if missing)
        env:
          APP_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          set -euo pipefail
          API="https://api.github.com"

          CODE="$(curl -sS -o /dev/null -w "%{http_code}" \
            -H "Authorization: Bearer ${APP_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            "${API}/repos/${ORG}/${RUNNER_REPO}")"

          if [ "${CODE}" = "200" ]; then
            echo "Repo exists: ${ORG}/${RUNNER_REPO}"
            exit 0
          fi

          echo "Repo not found, creating: ${ORG}/${RUNNER_REPO}"
          curl -sS -L -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${APP_TOKEN}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "${API}/orgs/${ORG}/repos" \
            -d "{\"name\":\"${RUNNER_REPO}\",\"private\":false,\"auto_init\":true}"

      - name: Checkout ruoyi-vue-pro (master-jdk17)
        uses: actions/checkout@v4
        with:
          repository: ${{ env.RUOYI_REPO }}
          ref: ${{ env.RUOYI_REF }}
          path: ruoyi
          fetch-depth: 1

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven
          cache-dependency-path: |
            backend/pom.xml
            ruoyi/pom.xml

      - name: Import SQL
        run: |
          sudo apt-get update
          sudo apt-get install -y mysql-client
          for f in sql/schema/*.sql; do
            mysql -h 127.0.0.1 -P 3306 -uroot -proot codegen_db < "$f"
          done

      - name: Run codegen runner (your backend project)
        env:
          DB_URL: jdbc:mysql://127.0.0.1:3306/codegen_db?useSSL=false&serverTimezone=UTC
          DB_USER: root
          DB_PWD: root
          RUOYI_DIR: ${{ github.workspace }}/ruoyi
          CODEGEN_OUTPUT_DIR: ${{ github.workspace }}/out/generated
        run: |
          test -f backend/pom.xml || (echo "Missing backend/pom.xml" && exit 2)
          mvn -q -f backend/pom.xml -DskipTests=false -Dtest=CodegenCiRunnerTest test

      - name: Push generated code to runner repo
        env:
          APP_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          set -euo pipefail
          test -d out/generated || (echo "Missing out/generated" && exit 3)

          cd out/generated
          git init -q
          git config user.name "FutureCloneApp[bot]"
          git config user.email "FutureCloneApp[bot]@users.noreply.github.com"
          git add -A
          git commit -m "chore(codegen): update generated code" || true
          git branch -M main
          git remote add origin "https://x-access-token:${APP_TOKEN}@github.com/${ORG}/${RUNNER_REPO}.git"
          git push -u origin main --force

      - name: Upload generated code
        uses: actions/upload-artifact@v4
        with:
          name: generated-code
          path: out/generated
